<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F0F2F5" />
  <title>Ciclo — El sistema operativo para la lavandería moderna en México</title>
  <meta name="description" content="Punto de venta, órdenes, rutas, pagos y CFDI 4.0 — todo en un mismo lugar para lavanderías y tintorerías en México." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- Fonts: display (Bricolage Grotesque), body (Geist + Inter fallback), mono (Geist Mono), italic accent (Instrument Serif) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Design system: tokens → base → reusable components → page-specific -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/landing.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel via CDN. No build step. -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Order matters: i18n → reusable UI → page composition.
       Uses classic script semantics so each file can publish to `window.X`
       and downstream files can pick those up. -->
  <script type="text/babel" data-presets="env,react" src="src/i18n.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/ui.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/landing.jsx"></script>
</body>
</html>
